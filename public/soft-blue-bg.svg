<svg width="1600" height="1068" viewBox="0 0 1600 1068" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur-xl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="90" />
    </filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.02" />
      </feComponentTransfer>
    </filter>
    <radialGradient id="base" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 534) rotate(90) scale(620 930)">
      <stop stop-color="#F6FBFE" />
      <stop offset="1" stop-color="#EAF6FC" />
    </radialGradient>
  </defs>

  <rect width="1600" height="1068" fill="url(#base)" />

  <g filter="url(#blur-xl)">
    <ellipse cx="1150" cy="220" rx="310" ry="210" fill="#CAF0F8" />
    <ellipse cx="820" cy="330" rx="370" ry="250" fill="#BDEFFC" />
    <ellipse cx="430" cy="780" rx="360" ry="260" fill="#B8EAFA" />
    <ellipse cx="1270" cy="820" rx="370" ry="260" fill="#B4EAF9" />
    <ellipse cx="860" cy="620" rx="250" ry="180" fill="#EAF8FE" />
  </g>

  <rect width="1600" height="1068" fill="#FFFFFF" opacity="0.28" />
  <rect width="1600" height="1068" filter="url(#noise)" />
</svg>
